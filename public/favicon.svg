<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <style>
    /* Valores del Light Theme */
    .bracket { stroke: #0ea5e9; } /* --secondary (sky-500) */
    .slash { stroke: #059669; } /* --primary (emerald-600) */
    .glitch-shadow { stroke: #6366f1; opacity: 0.6; } /* --accent (indigo-500) */
    
    /* Valores del Dark Theme (para navegadores en modo oscuro) */
    @media (prefers-color-scheme: dark) {
      .bracket { stroke: #0284c7; } /* --secondary (sky-500 modo oscuro) */
      .slash { stroke: #34d399; } /* --primary (emerald-400) */
      .glitch-shadow { stroke: #8b5cf6; opacity: 0.8; } /* --accent (violet-500) */
    }
  </style>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <g class="glitch-shadow" stroke-width="2">
      <path d="M 20 20 L 10 30 L 20 40" />
      <path d="M 40 20 L 50 30 L 40 40" />
    </g>
    
    <g class="bracket" stroke-width="4.5">
      <path d="M 22 22 L 12 32 L 22 42" />
      <path d="M 42 22 L 52 32 L 42 42" />
    </g>
    
    <path d="M 38 18 L 26 46" class="slash" stroke-width="4.5" />
    
  </g>
</svg>
